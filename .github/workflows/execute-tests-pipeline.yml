name: Execute test cases 
on:
  workflow_dispatch:
run-name: Execute test cases 
jobs:
  docker-setup:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: set up docker image
        run: docker run -p 3000:3000 ghcr.io/danielsilva-loanpro/sdet-interview-challenge:latest

      - name: verify it is running
        run: |
          docker run -d --name sdet-interview-challenge:latest
          sleep 25
          docker ps
  DEV:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    needs: docker-setup
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Execute Schedule Test Suite
        run: npm run dev

      - name: Upload html report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: QA-Execution-Report
          path: reports/
          retention-days: 1
  PROD:
    needs: docker-setup
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Execute Schedule Test Suite
        id: ManualTestExecution
        run: npm run prod

      - name: Upload html report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: PROD-Execution-Report
          path: reports/
          retention-days: 1
