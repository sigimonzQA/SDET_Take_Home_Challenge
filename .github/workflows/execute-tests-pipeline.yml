name: Execute test cases 
on:
  workflow_dispatch:
run-name: Execute test cases 
jobs:
  DEV:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    needs: docker-setup
    services:
      app:
        image: ghcr.io/danielsilva-loanpro/sdet-interview-challenge:latest
        ports:
          - 3000:3000
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Execute Schedule Test Suite
        run: npm run dev

      - name: Upload html report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: QA-Execution-Report
          path: reports/
          retention-days: 1
  PROD:
    needs: docker-setup
    timeout-minutes: 20
    runs-on: ubuntu-latest
    services:
      app:
        image: ghcr.io/danielsilva-loanpro/sdet-interview-challenge:latest
        ports:
          - 3000:3000
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Execute Schedule Test Suite
        id: ManualTestExecution
        run: npm run prod

      - name: Upload html report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: PROD-Execution-Report
          path: reports/
          retention-days: 1
